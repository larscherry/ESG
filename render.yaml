services:
  - type: web
    name: breathe-esg
    runtime: python
    repo: https://github.com/YOUR_USERNAME/breathe-esg
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: gunicorn breatheesg.wsgi:application --workers=4 --bind=0.0.0.0:$PORT --log-level=info
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: PORT
        value: "8000"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: NODE_VERSION
        value: "20.18.0"
    healthCheckPath: /api/analytics
    autoDeploy: true
    disk:
      name: sqlite-data
      mountPath: /var/lib/data
      sizeGB: 1
